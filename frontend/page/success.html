<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Success</title>

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/style_succ.css">
  <script src="../js/script.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

  <!-- Header -->
  <header class="header-container">
    <button class="logo" onclick="goHome()">
      HOUSE OF DEV TOOLS
    </button>
    <button class="history-btn" onclick="goHistory()">
      🔍 ส่องอดีต
    </button>
  </header>
  <main class="container">
    <!-- Title -->
    <section class="title-his">
      <h1>เสร็จแล้วจ้า!🎉</h1>
      <p>
        <span class="orange">จัดเต็มระบบ</span>ให้ครบทั้ง
        <span class="red">PDF</span> และ
        <span class="green">Excel</span> เริ่ด!
      </p>
    </section>

    <!-- Card -->
    <div class="card">

      <div class="hero-wrap">
        <img src="../assets/img/Thx.png" class="hero-img" alt="hedgehog">

        <div class="text-left shake">เทสมาก</div>
        <div class="text-right shake">อะไรใหม่ๆ</div>
      </div>

      <h2>จัดให้เฉพาะกิจ โหลดได้เลยจ้าาา!</h2>

      <!-- Buttons -->
      <div class="btn-group">

        <button class="download pdf" id="btn-download-pdf">
          <span><img src="../assets/img/pdf.png" class="icon"></span>
          <div>
            <strong>โหลด PDF</strong>
            <small>ง่าย จบในไฟล์เดียวไม่เม็ดเยอะ</small>
          </div>
        </button>

        <button class="download excel" id="btn-download-excel">
          <span><img src="../assets/img/xls.png" class="icon"></span>
          <div>
            <strong>โหลด Excel</strong>
            <small>แยก ID ใช้ง่าย โคตรโปร</small>
          </div>
        </button>

      </div>

      <p class="foot">ขอแบบอื่นอีกก็บอกนะ 😏</p>

    </div>
  </main>
</body>

</html>
